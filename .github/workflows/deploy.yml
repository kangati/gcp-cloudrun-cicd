name: Deploy to Cloud Run

on:
  push:
    branches:
      - main  # Triggers the pipeline whenever you push to the main branch

env:
  PROJECT_ID: mysecondproject-501012      # ⚠️ Replace with your actual GCP Project ID
  REGION: asia-south1                  # The region where your Artifact Registry/Cloud Run are
  REPO_NAME: my-app-repo               # The name of your Artifact Registry repo
  SERVICE_NAME: my-cloudrun-service    # The name you want for your Cloud Run app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull the code from your GitHub repo into the GitHub Actions runner
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Login to GCP using the Secret Key you just created
     - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # 3. Install the Google Cloud tools on the GitHub runner
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # 4. Give Docker permission to push images to your GCP Artifact Registry
    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    # 5. Read your Dockerfile, build the image, and push it to GCP
    - name: Build and Push Docker Image
      run: |
        IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        docker build -t $IMAGE_TAG .
        docker push $IMAGE_TAG

    # 6. Tell Cloud Run to pull the new Docker image and update your app
    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE_NAME }}
        region: ${{ env.REGION }}
        image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        flags: '--allow-unauthenticated' # Makes the web application public
